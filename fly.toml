# fly.toml — Fly.io deployment config for qa-agent (format v2)
# Update `app` to match your Fly app name from the dashboard.

app = "qa-agent-sp"
primary_region = "arn"  # Stockholm — closest to Romania; change if needed

[build]

[env]
  PORT = "8080"
  # QA_BROWSER is not set here — Browserbase activates automatically when
  # QA_BROWSERBASE_API_KEY + QA_BROWSERBASE_PROJECT_ID secrets are present.

# Reports + SQLite state store live on a persistent volume.
# Single-machine only — multi-instance needs Postgres + R2 (Phase 2 Step 5).
[[mounts]]
  source      = "qa_agent_reports"
  destination = "/app/reports"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 10
    soft_limit = 5

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "1gb"
